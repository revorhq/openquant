[project]
name = "oq-core"
version = "0.1.0"
description = "Shared primitives for the OpenQuant India ecosystem: Instrument, TradingCalendar, config."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
authors = [{ name = "OpenQuant India Contributors" }]
keywords = ["quant", "trading", "india", "nse", "backtesting", "finance"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Intended Audience :: Financial and Insurance Industry",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Office/Business :: Financial :: Investment",
]
dependencies = []

[project.urls]
Homepage = "https://github.com/openquant-india/openquant"
Repository = "https://github.com/openquant-india/openquant"
Issues = "https://github.com/openquant-india/openquant/issues"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/oq_core"]
