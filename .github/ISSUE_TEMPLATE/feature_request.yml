name: Feature request
description: Suggest a new feature or capability
title: "[feat] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the user / workflow problem. Avoid jumping to solutions.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: API sketch, behaviour, configuration — whatever is concrete enough to discuss.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: package
    attributes:
      label: Which package?
      options:
        - oq-core
        - oq-data
        - oq-backtest
        - oq-mcp
        - oq-broker
        - oq-zoo
        - other / cross-cutting
    validations:
      required: true
  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      options:
        - label: I agree to follow the project's Code of Conduct.
          required: true
